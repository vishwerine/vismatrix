<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logout - VisMatrix.Space</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 2rem 1rem;
            position: relative;
            overflow: hidden;
        }
        
        /* Animated background circles */
        body::before,
        body::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            animation: float 20s infinite ease-in-out;
        }
        
        body::before {
            width: 300px;
            height: 300px;
            top: -150px;
            left: 50%;
            transform: translateX(-50%);
            animation-delay: 1s;
        }
        
        body::after {
            width: 400px;
            height: 400px;
            bottom: -200px;
            left: 50%;
            transform: translateX(-50%);
            animation-delay: 6s;
        }
        
        @keyframes float {
            0%, 100% { transform: translate(-50%, 0) scale(1); }
            33% { transform: translate(-50%, -30px) scale(1.1); }
            66% { transform: translate(-50%, 30px) scale(0.9); }
        }
        
        .logout-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 480px;
        }
        
        .logout-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.3);
            padding: 3rem 2.5rem;
            text-align: center;
            animation: slideUp 0.6s ease-out;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .icon-container {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.15) 0%, rgba(118, 75, 162, 0.15) 100%);
            border-radius: 50%;
            margin-bottom: 2rem;
            position: relative;
        }
        
        .icon-container::before {
            content: '';
            position: absolute;
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
            border-radius: 50%;
            animation: ripple 3s infinite;
        }
        
        @keyframes ripple {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            100% {
                transform: scale(1.5);
                opacity: 0;
            }
        }
        
        .icon-container i {
            font-size: 3rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            position: relative;
            z-index: 1;
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        h1 {
            color: #2d3748;
            font-weight: 700;
            margin-bottom: 1rem;
            font-size: 2rem;
            letter-spacing: -0.5px;
        }
        
        p {
            color: #718096;
            margin-bottom: 2.5rem;
            font-size: 1.05rem;
            line-height: 1.6;
        }
        
        .btn {
            padding: 1rem 2rem;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            width: 100%;
            margin-bottom: 0.875rem;
            border: none;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        
        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }
        
        .btn:hover::before {
            width: 300px;
            height: 300px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 24px rgba(102, 126, 234, 0.4);
        }
        
        .btn-primary:active {
            transform: translateY(-1px);
        }
        
        .btn-primary span {
            position: relative;
            z-index: 1;
        }
        
        .btn-secondary {
            background: white;
            border: 2px solid #e8e8e8;
            color: #4a5568;
        }
        
        .btn-secondary:hover {
            border-color: #667eea;
            color: #667eea;
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(102, 126, 234, 0.15);
        }
        
        .btn-secondary:active {
            transform: translateY(0);
        }
        
        .btn-secondary span {
            position: relative;
            z-index: 1;
        }
        
        .message-box {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.08) 0%, rgba(118, 75, 162, 0.08) 100%);
            border: 1px solid rgba(102, 126, 234, 0.2);
            padding: 1.25rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            font-size: 0.9rem;
            color: #4a5568;
            line-height: 1.6;
        }
        
        .message-box i {
            color: #667eea;
            margin-right: 0.5rem;
            font-size: 1.1rem;
        }
        
        /* Responsive adjustments */
        @media (max-width: 576px) {
            .logout-card {
                padding: 2.5rem 1.5rem;
            }
            
            h1 {
                font-size: 1.75rem;
            }
            
            .icon-container {
                width: 80px;
                height: 80px;
            }
            
            .icon-container::before {
                width: 100px;
                height: 100px;
            }
            
            .icon-container i {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="logout-container">
        <div class="logout-card">
            <div class="icon-container">
                <i class="bi bi-box-arrow-right"></i>
            </div>
            
            <h1>Sign Out</h1>
            <p>Are you sure you want to sign out of your account?</p>
            
            <div class="message-box">
                <i class="bi bi-shield-check"></i>
                <strong>Your progress is saved!</strong> All your data will be securely stored and ready when you return.
            </div>
            
            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-primary">
                    <span>
                        <i class="bi bi-check-circle me-2"></i>Yes, Sign Me Out
                    </span>
                </button>
            </form>
            
            <a href="{% url 'dashboard' %}" class="btn btn-secondary text-decoration-none">
                <span>
                    <i class="bi bi-arrow-left me-2"></i>No, Take Me Back
                </span>
            </a>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
